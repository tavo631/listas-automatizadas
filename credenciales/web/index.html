<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Contraseña Interactiva</title>
    <!-- Tailwind CSS y Phosphor Icons para los estilos y las "casillas" -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">

    <!-- CONTENEDOR DEL FRAGMENTO (Copia esto a tu formulario) -->
    <div class="w-full max-w-sm bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 block">Contraseña Segura</label>
        
        <div class="relative">
            <input 
                type="password" 
                id="regPass" 
                required 
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}"
                class="w-full p-3 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition-all duration-300"
                placeholder="Escribe tu contraseña..."
            >
        </div>

        <!-- Casillas de Validación (Se actualizan por JS) -->
        <ul class="mt-4 space-y-2 text-sm text-gray-400 font-medium transition-colors" id="password-rules">
            
            <li id="rule-length" class="flex items-center gap-2 transition-all duration-300">
                <i class="ph ph-x-circle text-lg icon-indicator"></i>
                <span>Mínimo 8 caracteres</span>
            </li>

            <li id="rule-lower" class="flex items-center gap-2 transition-all duration-300">
                <i class="ph ph-x-circle text-lg icon-indicator"></i>
                <span>Al menos 1 minúscula</span>
            </li>
            
            <li id="rule-upper" class="flex items-center gap-2 transition-all duration-300">
                <i class="ph ph-x-circle text-lg icon-indicator"></i>
                <span>Al menos 1 mayúscula</span>
            </li>
            
            <li id="rule-number" class="flex items-center gap-2 transition-all duration-300">
                <i class="ph ph-x-circle text-lg icon-indicator"></i>
                <span>Al menos 1 número</span>
            </li>

            <li id="rule-special" class="flex items-center gap-2 transition-all duration-300">
                <i class="ph ph-x-circle text-lg icon-indicator"></i>
                <span>Al menos 1 carácter especial (ej. @$!%*)</span>
            </li>
            
        </ul>
        
        <button id="btnRegistrar" disabled class="mt-6 w-full bg-slate-300 text-white font-bold py-3 rounded-lg transition-all duration-300 cursor-not-allowed">
            Registrar
        </button>

    </div>
    <!-- FIN DEL FRAGMENTO -->

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        // Referencias a los elementos del DOM
        const passInput = document.getElementById('regPass');
        const ruleLength = document.getElementById('rule-length');
        const ruleLower = document.getElementById('rule-lower');
        const ruleUpper = document.getElementById('rule-upper');
        const ruleNumber = document.getElementById('rule-number');
        const ruleSpecial = document.getElementById('rule-special');
        const btnRegistrar = document.getElementById('btnRegistrar');

        // Escuchar cada vez que el usuario escribe
        passInput.addEventListener('input', function() {
            const val = this.value;

            // Función para cambiar colores e iconos
            const updateRule = (element, isValid) => {
                const icon = element.querySelector('.icon-indicator');
                
                if (isValid) {
                    // Estado Correcto (Verde)
                    element.classList.remove('text-gray-400', 'text-red-400');
                    element.classList.add('text-green-600');
                    icon.classList.replace('ph-x-circle', 'ph-check-circle-fill');
                } else {
                    // Estado Incorrecto o Incompleto (Rojo/Gris)
                    element.classList.remove('text-green-600');
                    icon.classList.replace('ph-check-circle-fill', 'ph-x-circle');
                    
                    if (val.length > 0) {
                        element.classList.add('text-red-400');
                        element.classList.remove('text-gray-400');
                    } else {
                        element.classList.add('text-gray-400');
                        element.classList.remove('text-red-400');
                    }
                }
            };

            // Evaluamos las condiciones usando Expresiones Regulares (Regex)
            const isLengthValid = val.length >= 8;
            const isLowerValid = /[a-z]/.test(val);
            const isUpperValid = /[A-Z]/.test(val);
            const isNumberValid = /[0-9]/.test(val);
            const isSpecialValid = /[^A-Za-z0-9]/.test(val);

            // Actualizamos la interfaz
            updateRule(ruleLength, isLengthValid);
            updateRule(ruleLower, isLowerValid);
            updateRule(ruleUpper, isUpperValid);
            updateRule(ruleNumber, isNumberValid);
            updateRule(ruleSpecial, isSpecialValid);

            // Habilitar el botón solo si todo es correcto
            if (isLengthValid && isLowerValid && isUpperValid && isNumberValid && isSpecialValid) {
                btnRegistrar.disabled = false;
                btnRegistrar.classList.remove('bg-slate-300', 'cursor-not-allowed');
                btnRegistrar.classList.add('bg-green-700', 'hover:bg-green-800', 'shadow-lg');
            } else {
                btnRegistrar.disabled = true;
                btnRegistrar.classList.add('bg-slate-300', 'cursor-not-allowed');
                btnRegistrar.classList.remove('bg-green-700', 'hover:bg-green-800', 'shadow-lg');
            }
        });
    </script>
</body>
</html>
